<!DOCTYPE html>
<html>
<head>
    <style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}
#em {
    width: 100vw;
    height: 100vh;
    display: block;
}
#em canvas {
    width: 100% !important;
    height: 100% !important;
}
    </style>
</head>
<body>
    <div id="em"></div>
    <script type="text/javascript">
        EJS_player = '#em';
        EJS_color = "#0F1912";
EJS_startOnLoaded = true
        EJS_core = 'mgba';
        EJS_gameUrl = '/flashcard/pokemon-emerald-version/pokemon-emerald-version.gba';
        EJS_pathtodata = '/em/';
        EJS_threads = true;
        window.addEventListener('resize', () => {
            const canvas = document.querySelector('#em canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
    <script src="/em/loader.js"></script>
</body>
</html>
