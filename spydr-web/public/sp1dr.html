<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Original "spydr" concept, branding, and core architecture created by Web Creation Studios -->
    
    <title>spydr web</title>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/spydr-web/public/sp1dr.css">

</head>
<body>

    <!-- Browser Chrome Header -->
    <header class="browser-chrome">
        
        <!-- Top Tab Bar -->
        <div class="tabs-bar">
            <div class="tab active-tab">
                <i class="ri-radar-line tab-icon"></i>
                <span class="tab-title">spydr</span>
                <button class="close-tab"><i class="ri-close-line"></i></button>
            </div>
            <button class="new-tab-btn">
                <i class="ri-add-line"></i>
            </button>
        </div>

        <!-- Main Toolbar -->
        <div class="toolbar">
            <!-- Navigation Controls -->
            <div class="nav-controls">
                <button class="nav-btn" title="Back"><i class="ri-arrow-left-line"></i></button>
                <button class="nav-btn" title="Forward"><i class="ri-arrow-right-line"></i></button>
                <button class="nav-btn" title="Refresh"><i class="ri-refresh-line"></i></button>
            </div>

            <!-- Address Bar -->
            <div class="address-bar">
                <div class="secure-badge" title="Secure Connection">
                    <i class="ri-lock-2-line"></i>
                </div>
                <input
                    id="url"
                    type="text"
                    placeholder="Search Google or enter a URL..."
                    autocomplete="off"
                >
                <div class="bookmark-badge">
                    <i class="ri-star-line"></i>
                </div>
            </div>

            <!-- Action & Menu Buttons -->
            <div class="action-controls">
                <!-- Kept the #go ID as requested -->
                <button id="go" class="menu-btn">
                    <span>Go</span>
                </button>
                <!-- Browser menu button -->
                <button class="menu-btn icon-only" title="Settings">
                    <i class="ri-more-2-fill"></i>
                </button>
            </div>
        </div>

    </header>

    <!-- Main Proxy Viewport -->
    <main id="browser"></main>

    <!-- Scram, Jet! -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/spydr-web/public/sp1dr.js"></script>
  
</body>
</html>
