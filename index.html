<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>spydr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">

  <script src="/js/theme.js"></script>
  <script src="/js/three.min.js"></script>
</head>

<body>

  <!-- BACKGROUND -->
  <div id="vanta-bg"></div>
  <div class="overlay"></div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div id="time">--:--:--</div>
    <div id="date">loading...</div>
  </div>

  <!-- TOP RIGHT -->
  <div class="top-right">
    <button onclick="go('/settings.html')">⚙ settings</button>
    <button onclick="go('/login.html')">🔐 login</button>
  </div>

  <!-- MENU -->
  <div class="menu-wrapper">

    <button id="menu-btn">☰</button>

    <div id="menu">
      <button onclick="go('/games.html')">🎮 games</button>
      <button onclick="go('/apps.html')">📦 apps</button>
      <button onclick="go('/browser.html')">🌐 browser</button>
      <button onclick="go('/watch.html')">🎬 movies</button>
      <button onclick="go('/ai.html')">🤖 ai chat</button>
      <button onclick="go('/chat.html')">💬 chat</button>
      <button onclick="go('/music.html')">🎵 music</button>
    </div>

  </div>

  <!-- CENTER -->
  <div class="center">

    <div class="logo-container">

      <img id="spider" src="spider.png" alt="spydr">

      <div class="logo-text-wrap">
        <div class="logo">spydr</div>
        <div class="version-tag" id="constText">loading...</div>
      </div>

    </div>

  </div>

  <!-- SPLASH -->
  <div class="splash" id="splash"></div>

  <!-- VERSION -->
  <div class="version-area">
    <button onclick="goUpdates()">current version: spydr v1.0</button>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
