text-decoration: none;
padding: 8px 16px;

<script>
var GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"windowkill","experimentalVK":false,"fileSizes":{"windowkill.pck":51163808,"windowkill.wasm":43016933},"focusCanvas":true,"gdextensionLibs":[]};

var statusOverlay = document.getElementById("status");

var statusNotice = document.getElementById("status-notice");
var initializing = true;
var statusMode = "";
function initVanta() {
if (vantaEffect || !window.VANTA) return;

el: "#vanta-bg",

function setStatusMode(mode) {

}
if (mode === "hidden") {
if (vantaEffect) {
vantaEffect.destroy();
vantaEffect = null;
}
statusOverlay.remove();
initializing = false;
return;
}
statusOverlay.style.visibility = "visible";
statusProgress.style.display = mode === "progress" ? "block" : "none";
statusNotice.style.display = mode === "notice" ? "block" : "none";
statusMode = mode;
initVanta();
}
function setStatusNotice(text) {
while (statusNotice.lastChild) {
statusNotice.removeChild(statusNotice.lastChild);
}
var lines = text.split("\n");
lines.forEach(function(line) {
statusNotice.appendChild(document.createTextNode(line));
statusNotice.appendChild(document.createElement("br"));
});
}
function displayFailureNotice(err) {
console.error(err);
if (err instanceof Error) {
setStatusNotice(err.message);
} else if (typeof err === "string") {
setStatusNotice(err);
} else {
setStatusNotice("An unknown error occurred.");
}
setStatusMode("notice");

"onProgress": function (current, total) {

var barWidth = progressBar.offsetWidth;
var logoWidth = progressLogo.offsetWidth;

progressLogo.style.left = position + "px";
}
} else {
statusProgress.removeAttribute("value");
statusProgress.removeAttribute("max");
}

}, displayFailureNotice);
