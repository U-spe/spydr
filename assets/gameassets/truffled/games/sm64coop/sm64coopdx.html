            (container && container.clientWidth) ||
            document.documentElement.clientWidth ||
            (document.body && document.body.clientWidth) ||
            window.innerWidth ||
            canvasElement.clientWidth ||

            (container && container.clientHeight) ||
            document.documentElement.clientHeight ||
            (document.body && document.body.clientHeight) ||
            window.innerHeight ||
            canvasElement.clientHeight ||
            768

        return { width: viewportWidth, height: viewportHeight };
      }

        var renderWidth = size.width;
        var renderHeight = size.height;
        canvasElement.style.left = '0';
        canvasElement.style.top = '0';
        canvasElement.style.width = '100%';
        canvasElement.style.height = '100%';
        canvasElement.style.transform = 'none';
        if (canvasElement.width !== renderWidth || canvasElement.height !== renderHeight) {
          canvasElement.width = renderWidth;
          canvasElement.height = renderHeight;
          try {
            if (typeof Module !== 'undefined' && Module && typeof Module.setCanvasSize === 'function') {
              Module.setCanvasSize(renderWidth, renderHeight);
            }
          } catch (_) {}
        }
      }

      function resizeGameCanvasToViewportOnce() {
        if (!canvasElement) return;
        var size = getGameCanvasViewportSize();
        var renderWidth = size.width;
        var renderHeight = size.height;

          canvasElement.width = renderWidth;
          canvasElement.height = renderHeight;
          try {
            if (typeof Module !== 'undefined' && Module && typeof Module.setCanvasSize === 'function') {
              Module.setCanvasSize(renderWidth, renderHeight);

      function scheduleGameCanvasResize() {
        if (canvasResizeFrame) return;
        canvasResizeFrame = requestAnimationFrame(function() {
          canvasResizeFrame = 0;

      function startGameCanvasResizePump(durationMs) {
        canvasResizePumpEnds = Math.max(canvasResizePumpEnds, Date.now() + durationMs);

          resizeGameCanvasToViewport();
          if (Date.now() > canvasResizePumpEnds) {
            clearInterval(canvasResizePump);
            canvasResizePump = 0;
          }
        }, 100);
      }

      function installGameCanvasResizeHooks() {
        resizeGameCanvasToViewport();
        startGameCanvasResizePump(4000);
        [0, 50, 100, 250, 500, 1000, 2000, 4000, 8000, 12000].forEach(function(delay) {
          setTimeout(resizeGameCanvasToViewport, delay);
        });
        window.addEventListener('resize', function() {
          scheduleGameCanvasResize();

        window.addEventListener('orientationchange', function() {
          startGameCanvasResizePump(1500);

        window.addEventListener('pageshow', function() { startGameCanvasResizePump(1500); });
        window.addEventListener('load', function() { startGameCanvasResizePump(3000); });

        return context;

      function addUniqueAudioContext(contexts, context) {
        if (context && contexts.indexOf(context) < 0) contexts.push(context);

          persistentStorageMounted = true;
        } catch (error) {
          webPrint('Browser save mount failed: ' + formatUploadError(error));
          return;
        }

        var dependency = 'sm64-persistent-storage';
        if (typeof addRunDependency === 'function') addRunDependency(dependency);
        fs.syncfs(true, function(error) {
          if (error) {
            webPrint('Browser save load failed: ' + formatUploadError(error));
          } else {
            persistentStorageReady = true;
            try {
              ensureUploadDirectory(uploadedDynosCachePath);
              repairPersistentAudioConfig();
              var restoredMods = restorePersistentUploadedMods();
              if (restoredMods > 0) webPrint('Loaded cached uploaded mods: ' + restoredMods + ' file(s).');
            } catch (restoreError) {
              webPrint('Cached browser storage restore failed: ' + formatUploadError(restoreError));
            }
          }
          if (typeof removeRunDependency === 'function') removeRunDependency(dependency);
          if (persistentSyncQueued) {
            persistentSyncQueued = false;
            syncPersistentStorage();
          }
        });
      }

      function waitForAudioWorkletShim() {
        var ready = window.__sm64AudioWorkletReady;
        if (!ready || typeof addRunDependency !== 'function' || typeof removeRunDependency !== 'function') return;
        var dependency = 'sm64-audio-worklet-shim';
        addRunDependency(dependency);
        ready.finally(function() {
          removeRunDependency(dependency);
        });
      }

      async function uploadModFiles(files) {
        if (!Module || !Module.FS) {
          webPrint('Runtime is not ready for mod upload yet.');
          return;
        }
        var plan = normalizeFolderModEntries(files);
        if (!plan.entries.length) {
          webPrint('No valid mod folder found. Choose a folder that contains main.lua.');
          return;
        }

        webPrint('Uploading mod folder: ' + plan.replaceRoots.join(', '));
        await writeUploadedFolderEntries(plan.entries, plan.replaceRoots);
        webPrint('Uploaded ' + plan.replaceRoots.length + ' mod folder(s), ' + plan.entries.length + ' file(s). Open Mods and press Refresh if the list is already open.');
      }

      async function uploadDynosFiles(files) {
        if (!Module || !Module.FS) {
          webPrint('Runtime is not ready for DynOS upload yet.');
          return;
        }
        var plan = normalizeDynosPackEntries(files);
        if (!plan.entries.length) {
          webPrint('No valid DynOS pack folder found. Choose the pack folder, or a folder containing dynos/packs.');
          return;
        }

        webPrint('Uploading DynOS pack: ' + plan.replaceRoots.join(', '));
        await writeUploadedDynosEntries(plan.entries, plan.replaceRoots);
        webPrint('Uploaded ' + plan.replaceRoots.length + ' DynOS pack(s), ' + plan.entries.length + ' file(s). Open DynOS and press Refresh if the list is already open.');
      }

      window.sm64UploadDynosFolder = function() {
        if (!dynosUploadInputElement) return;
        dynosUploadInputElement.click();
      };

      async function downloadPersistentSaves() {
        await flushPersistentStorageForDownload();
        var entries = collectPersistentFiles('/sm64coopdx');
        if (!entries.length) {
          webPrint('No browser saves or options found yet.');
          return;
        }

        var zip = createStoredZip(entries);
        var blob = new Blob([zip], { type: 'application/zip' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = 'sm64coopdx-saves.zip';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        webPrint('Downloaded browser saves/options: ' + entries.length + ' file(s).');
      }

      modUploadInputElement.addEventListener('change', (event) => {
        uploadModFiles(Array.from(event.target.files || [])).catch((error) => {
          webPrint('Mod upload failed: ' + formatUploadError(error));
        }).finally(() => {
          modUploadInputElement.value = '';
        });
      });

      dynosUploadInputElement.addEventListener('change', (event) => {
        uploadDynosFiles(Array.from(event.target.files || [])).catch((error) => {
          webPrint('DynOS upload failed: ' + formatUploadError(error));
        }).finally(() => {
          dynosUploadInputElement.value = '';
        });
      });

      downloadSavesElement.addEventListener('click', () => {
        downloadPersistentSaves().catch((error) => {
          webPrint('Save download failed: ' + formatUploadError(error));
        });
      });

      // As a default initial behavior, pop up an alert when webgl context is lost. To make your
      // application robust, you may want to override this behavior before shipping!
      // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      var setStatus = (text) => {
        if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
        if (text === setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        // if this is a progress update, skip it if too soon
        if (m && now - setStatus.last.time < 30) return;
        setStatus.last.time = now;
        setStatus.last.text = text;
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2])*100;
          progressElement.max = parseInt(m[4])*100;
          progressElement.hidden = false;
          spinnerElement.hidden = false;
        } else {
          progressElement.value = null;
          progressElement.max = null;
          progressElement.hidden = true;
          if (!text) spinnerElement.style.display = 'none';
        }
        statusElement.innerHTML = text;
      };

      function redirectSm64ExitToHome() {
        var target = 'https://truffled.lol/';
        try {
          if (window.top && window.top !== window) {
            window.top.location.href = target;
            return;
          }
        } catch (_) {}
        window.location.href = target;
      }

      var Module = {
        preRun: [mountPersistentStorage, waitForAudioWorkletShim],
        postRun: [function() {
          startGameCanvasResizePump(3000);
          if (audioUserInteracted) resumeBrowserAudio();
        }],
        print(...args) {
          console.log(...args);
          // These replacements are necessary if you render to raw HTML
          //text = text.replace(/&/g, "&amp;");
          //text = text.replace(/</g, "&lt;");
          //text = text.replace(/>/g, "&gt;");
          //text = text.replace('\n', '<br>', 'g');
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight; // focus on bottom
          }
        },
        canvas: canvasElement,
        onExit: redirectSm64ExitToHome,
        setStatus: setStatus,
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      window.addEventListener('pagehide', syncPersistentStorage);
      setStatus('Downloading...');
      window.onerror = (event, source, lineno, colno, error) => {
        // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
        window.__sm64LastError = {
          message: event && event.message ? event.message : String(event),
          source: source || '',
          lineno: lineno || 0,
          colno: colno || 0,
          stack: error && error.stack ? error.stack : ''
        };
        if (outputElement) {
          outputElement.value += '[runtime error] ' + window.__sm64LastError.message + "\n";
          if (window.__sm64LastError.stack) {
            outputElement.value += window.__sm64LastError.stack + "\n";
          }
          outputElement.scrollTop = outputElement.scrollHeight;
        }
        setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>
    <script async type="text/javascript" src="sm64coopdx.js"></script>
  </body>
</html>
