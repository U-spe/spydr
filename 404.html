<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 - spydr</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #000000, #120018, #2a0040);
  overflow: hidden;
  color: white;
}

/* glow */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(140px);
  opacity: 0.35;
}

.glow.purple {
  background: #a855f7;
  top: -140px;
  left: -140px;
}

.glow.blue {
  background: #3b82f6;
  bottom: -140px;
  right: -140px;
}

/* center card */
.card {
  position: relative;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  width: 360px;
}

/* 🕷️ spider/logo */
.logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
  filter: brightness(0) invert(1); /* makes it white */
  margin-bottom: 10px;
}

/* glitch text */
.glitch {
  font-size: 3.5rem;
  font-weight: 900;
  position: relative;
  display: inline-block;
  color: white;
}

.glitch::before,
.glitch::after {
  content: "404";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  opacity: 0.8;
}

.glitch::before {
  color: #a855f7;
  z-index: -1;
  animation: glitch1 0.8s infinite;
}

.glitch::after {
  color: #3b82f6;
  z-index: -2;
  animation: glitch2 0.8s infinite;
}

@keyframes glitch1 {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-1px, -2px); }
  60% { transform: translate(2px, 1px); }
  80% { transform: translate(-2px, -1px); }
  100% { transform: translate(0); }
}

@keyframes glitch2 {
  0% { transform: translate(0); }
  20% { transform: translate(2px, -2px); }
  40% { transform: translate(1px, 2px); }
  60% { transform: translate(-2px, 1px); }
  80% { transform: translate(2px, 2px); }
  100% { transform: translate(0); }
}

p {
  opacity: 0.75;
  font-size: 0.95rem;
  margin-top: 5px;
  margin-bottom: 15px;
  text-align: center;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #a855f7;
  color: white;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #9333ea;
}
</style>
</head>

<body>

<div class="glow purple"></div>
<div class="glow blue"></div>

<div class="card">

  <!-- spider on top -->
  <img class="logo" src="/assets/images/logo.png" alt="spydr logo"/>

  <!-- glitch 404 -->
  <div class="glitch">404</div>

  <p>this page got tangled up in a spider web 🕷️</p>

  <button onclick="goBack()">go back</button>

</div>

<script>
function goBack() {
  if (document.referrer) {
    window.history.back();
  } else {
    window.location.href = "/";
  }
}
</script>

</body>
</html>
