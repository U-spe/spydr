<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Original "spydr" concept, branding, and core architecture by Web Creation Studios -->
    
    <title>spydr web</title>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/sp1dr.css">

</head>
<body>

    <!-- Top Browser Chrome (Window Aesthetic) -->
    <div class="top-chrome">
        <div class="window-controls">
            <span class="dot close"></span>
            <span class="dot minimize"></span>
            <span class="dot maximize"></span>
        </div>
        <div class="brand">
            <i class="ri-radar-line spydr-icon"></i>
            <span>spydr</span>
        </div>
        <div class="placeholder"></div> <!-- Balances flexbox to center the brand -->
    </div>

    <!-- Main Proxy Viewport -->
    <main id="browser"></main>

    <!-- Bottom Interface (Floor Layout) -->
    <header class="bottom-interface">
        
        <!-- Search Box (Lower to the floor, above the menu) -->
        <div class="search-bar-container">
            <div class="address-bar">
                <i class="ri-lock-2-line lock-icon"></i>
                <input
                    id="url"
                    type="text"
                    placeholder="Search Google or enter a URL..."
                    autocomplete="off"
                >
            </div>
        </div>

        <!-- Menu (The Floor) -->
        <div class="bottom-menu">
            <!-- Left Menu Actions -->
            <div class="menu-group">
                <button class="menu-btn white-btn" title="Back">
                    <i class="ri-arrow-left-line"></i>
                </button>
                <button class="menu-btn white-btn" title="Forward">
                    <i class="ri-arrow-right-line"></i>
                </button>
            </div>
            
            <!-- Main Go Action (Your functional button) -->
            <button id="go" class="menu-btn white-btn main-go">
                <span>Go</span>
            </button>
            
            <!-- Right Menu Actions -->
            <div class="menu-group">
                <button class="menu-btn white-btn" title="Home">
                    <i class="ri-home-5-line"></i>
                </button>
                <button class="menu-btn white-btn" title="Settings">
                    <i class="ri-menu-line"></i>
                </button>
            </div>
        </div>

    </header>

    <!-- Scram, Jet! -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/sp1dr.js"></script>
  
</body>
</html>
