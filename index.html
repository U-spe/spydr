<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>spydr</title>

  <!-- remix icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/main.css"/>
</head>

<body>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    
    <div class="brand">
      <div class="logo">spydr</div>
      <div class="const-text" id="constText">loading...</div>
    </div>

    <div class="nav-links">
      <a href="#home"><i class="ri-home-line"></i><span>home</span></a>
      <a href="#featured"><i class="ri-star-line"></i><span>featured</span></a>
      <a href="#games"><i class="ri-gamepad-line"></i><span>games</span></a>
      <a href="#credits"><i class="ri-information-line"></i><span>credits</span></a>
    </div>

  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- HERO -->
    <section id="home" class="hero">
      <h1>spydr</h1>
      <p>clean. fast. minimal.</p>
    </section>

    <!-- FEATURED -->
    <section id="featured" class="section">
      <h2>featured</h2>
      <div class="grid">
        <div class="card">game one</div>
        <div class="card">game two</div>
        <div class="card">game three</div>
      </div>
    </section>

    <!-- GAMES -->
    <section id="games" class="section">
      <h2>games</h2>
      <div class="grid" id="gameGrid"></div>
    </section>

    <!-- FOOTER -->
    <footer id="credits">
      <p>spydr © 2026</p>
    </footer>

  </main>

  <script src="/js/main.js"></script>
</body>
</html>
