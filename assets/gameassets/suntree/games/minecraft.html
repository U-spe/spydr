    <style type="text/css">@font-face {font-family:Quicksand;font-style:normal;font-weight:300;src:url(/cf-fonts/v/quicksand/5.2.10/vietnamese/wght/normal.woff2);unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:300;src:url(/cf-fonts/v/quicksand/5.2.10/latin/wght/normal.woff2);unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:300;src:url(/cf-fonts/v/quicksand/5.2.10/latin-ext/wght/normal.woff2);unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:400;src:url(/cf-fonts/v/quicksand/5.2.10/vietnamese/wght/normal.woff2);unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:400;src:url(/cf-fonts/v/quicksand/5.2.10/latin/wght/normal.woff2);unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:400;src:url(/cf-fonts/v/quicksand/5.2.10/latin-ext/wght/normal.woff2);unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;font-display:swap;}@font-face {font-family:Quicksa uicksand/5.2.10/latin/wght/normal.woff2);unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:700;src:url(/cf-fonts/v/quicksand/5.2.10/vietnamese/wght/normal.woff2);unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB;font-display:swap;}@font-face {font-family:Quicksand;font-style:normal;font-weight:700;src:url(/cf-fonts/v/quicksand/5.2.10/latin-ext/wght/normal.woff2);unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;font-display:swap;}</style>
    <style>
        :root {
            --bg: #05030a;
            --purple-deep: #1a0a2e;
            --purple-mid: #3b1a6e;
            --purple-bright: #7b2fff;
            --purple-glow: #a855f7;
            --purple-light: #c084fc;
            --white: #f0e6ff;
            --muted: #7c6a9a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: default;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(123, 47, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(123, 47, 255, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        #fadeout {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease-in-out;
        }

        #fadeout.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loadingbox {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 0;
            width: 480px;
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--purple-bright);
            border-style: solid;
            z-index: 2;
        }
        .corner.tl { top: -4px; left: -4px; border-width: 3px 0 0 3px; }
        .corner.tr { top: -4px; right: -4px; border-width: 3px 3px 0 0; }
        .corner.bl { bottom: -4px; left: -4px; border-width: 0 0 3px 3px; }
        .corner.br { bottom: -4px; right: -4px; border-width: 0 3px 3px 0; }

        
        .header-panel {
            width: 100%;
            background: linear-gradient(135deg, var(--purple-deep) 0%, #0d0520 100%);
            border: 2px solid var(--purple-mid);
            border-bottom: none;
            padding: 28px 32px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple-bright), var(--purple-glow), var(--purple-bright), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: scaleX(0); opacity: 1; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }

        #theh1 {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 36px;
            color: var(--white);
            letter-spacing: 6px;
            line-height: 1;
            text-shadow:
                0 0 10px var(--purple-bright),
                0 0 30px var(--purple-mid),
                0 0 60px rgba(123,47,255,0.3);
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.6; }
            99% { opacity: 1; }
        }

        #thep {
            font-family: 'Quicksand', sans-serif;
            font-weight: 400;
            font-size: 13px;
            color: var(--purple-light);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.8;
        }

        
        .divider {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--purple-deep), var(--purple-bright), var(--purple-glow), var(--purple-bright), var(--purple-deep));
            position: relative;
        }

        .divider::after {
            content: '◆';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--purple-bright);
            font-size: 10px;
            background: #100620;
            padding: 0 6px;
        }

        
        .select-panel {
            width: 100%;
            background: linear-gradient(180deg, #0d0520 0%, #07031a 100%);
            border: 2px solid var(--purple-mid);
            border-top: none;
            padding: 24px 32px 28px;
        }

        .select-label {
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 10px;
            color: var(--purple-glow);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--purple-bright);
            font-size: 10px;
            pointer-events: none;
        }

        #themeSelector {
            width: 100%;
            background: #0a0318;
            color: var(--white);
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            font-size: 13px;
            padding: 12px 40px 12px 14px;
            border: 2px solid var(--purple-mid);
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            letter-spacing: 1px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #themeSelector:hover,
        #themeSelector:focus {
            border-color: var(--purple-bright);
            box-shadow:
                0 0 0 1px var(--purple-bright),
                0 0 20px rgba(123,47,255,0.3),
                inset 0 0 20px rgba(123,47,255,0.05);
        }

        #themeSelector option {
            background: #0a0318;
            color: var(--white);
            padding: 8px;
        }

        
        #launchBtn {
            margin-top: 16px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--purple-mid), var(--purple-bright));
            color: var(--white);
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 5px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(123,47,255,0.4);
            display: none;
        }

        #launchBtn.visible {
            display: block;
        }

        #launchBtn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.4s;
        }

        #launchBtn:hover::before {
            left: 100%;
        }

        #launchBtn:hover {
            background: linear-gradient(135deg, var(--purple-bright), var(--purple-glow));
            box-shadow: 0 0 35px rgba(123,47,255,0.7), 0 0 60px rgba(168,85,247,0.3);
            transform: translateY(-1px);
        }

        #launchBtn:active {
            transform: translateY(1px);
            box-shadow: 0 0 15px rgba(123,47,255,0.5);
        }

        
        .status-bar {
            width: 100%;
            background: #030110;
            border: 2px solid var(--purple-mid);
            border-top: 1px solid rgba(123,47,255,0.2);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--purple-bright);
            border-radius: 0;
            animation: pulse-dot 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; background: var(--purple-bright); }
            50% { opacity: 0.4; background: var(--purple-mid); }
        }

        .status-text {
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-ver {
            margin-left: auto;
            font-family: 'Quicksand', sans-serif;
            font-weight: 400;
            font-size: 10px;
            color: var(--purple-mid);
            letter-spacing: 1px;
        }

        
        .loader {
            width: 100%;
            height: 3px;
            background: rgba(123,47,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--purple-bright), var(--purple-glow), transparent);
            position: absolute;
            top: 0; left: 0;
            animation: loadbar 2.5s linear infinite;
        }

        @keyframes loadbar {
            0% { left: -120px; }
            100% { left: 100%; }
        }


        #launchOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        #launchOverlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .launch-text {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--purple-bright);
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: flicker 1.5s infinite;
        }

        .launch-bar-wrap {
            width: 280px;
            height: 4px;
            background: rgba(123,47,255,0.2);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .launch-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple-mid), var(--purple-bright), var(--purple-glow));
            width: 0%;
            transition: width 0.8s ease;
            box-shadow: 0 0 10px var(--purple-bright);
        }

        
        .fp {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--purple-bright);
            border-radius: 0;
            pointer-events: none;
            z-index: 2;
            animation: floatup linear infinite;
            opacity: 0;
        }

        @keyframes floatup {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(var(--drift)); opacity: 0; }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div id="fadeout">
    <div id="loadingbox">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="header-panel">
            <h1 class="theh1">eaglercraft</h1>
        </div>

        <div class="loader"></div>
        <div class="divider"></div>

        <div class="select-panel">
            <span class="select-label">select client</span>
            <div class="select-wrapper">
                <select id="themeSelector" onchange="handleSelect(this.value)">
                    <option value="select">— select a client —</option>
                    <option value="default">default (eagler 1.8.8 wasm)</option>
                    <option value="188js">eagler 1.8.8 js</option>
                    <option value="1122js">eagler 1.12.2 js</option>
                    <option value="1122wasm">eagler 1.12.2 wasm</option>
                    <option value="tuffjs">tuff client js</option>
                    <option value="tuffwasm">tuff client wasm</option>
                </select>
            </div>
            <button id="launchBtn" onclick="launch(document.getElementById('themeSelector').value)">Launch</button>
        </div>


    </div>
</div>

<div id="launchOverlay">
    <div class="launch-text" id="launchingText">launching...</div>
    <div class="launch-bar-wrap">
        <div class="launch-bar-fill" id="launchBar"></div>
    </div>
</div>



<script>
    function spawnParticle() {
        const p = document.createElement('div');
        p.className = 'fp';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.bottom = '-4px';
        const duration = 8 + Math.random() * 12;
        p.style.animationDuration = duration + 's';
        p.style.animationDelay = Math.random() * 2 + 's';
        p.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
        const colors = ['#7b2fff', '#a855f7', '#c084fc', '#3b1a6e'];
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() > 0.7 ? '4px' : '2px';
        p.style.width = size;
        p.style.height = size;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), (duration + 2) * 1000);
    }

    setInterval(spawnParticle, 400);
    for (let i = 0; i < 8; i++) setTimeout(spawnParticle, i * 200);

    
    function handleSelect(val) {
        const btn = document.getElementById('launchBtn');
        if (val !== 'select') {
            btn.classList.add('visible');
        } else {
            btn.classList.remove('visible');
        }
    }

    
    function launch(client) {
        if (client === 'select' || !client) return;

        const overlay = document.getElementById('launchOverlay');
        const bar = document.getElementById('launchBar');
        const launchingText = document.getElementById('launchingText');
        const fadeout = document.getElementById('fadeout');

        fadeout.classList.add('hidden');
        overlay.classList.add('active');

        let progress = 0;
        const msgs = ['launching... give it a second.'];
        let msgIdx = 0;

        const interval = setInterval(() => {
            progress += Math.random() * 25 + 5;
            if (progress > 100) progress = 100;
            bar.style.width = progress + '%';

            if (progress > msgIdx * 25 && msgIdx < msgs.length) {
                launchingText.textContent = msgs[msgIdx];
                msgIdx++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => navigateTo(client), 400);
            }
        }, 200);
    }

    function navigateTo(client) {
        const routes = {
            'default': '/flashcard/minecraft/188/wasm/wasm.html',
            '152': '/flashcard/minecraft/152/index.html',
            '188js': '/flashcard/minecraft/188/js.html',
            '1122js': '/flashcard/minecraft/1122/js.html',
            '1122wasm': '/flashcard/minecraft/1122/wasm.html',
            'precision': '/flashcard/minecraft/precision/index.html',
            'tuffjs': '/flashcard/minecraft/tuff/index.html',
            'tuffwasm': '/flashcard/minecraft/tuff/wasm/index.html',
        };
        if (routes[client]) {
            window.location.href = routes[client];
        } else {
            alert('client not found');
        }
    }
</script>
