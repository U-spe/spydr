<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spydr // ti-30x</title>
    
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/calculator.css">
    <link rel="stylesheet" href="/css/menu.css">
</head>

<body data-bg-style="stars">

    <div id="bg-effects-container">
        <canvas id="stars-canvas"></canvas>
    </div>

    <div id="global-menu"></div>

    <main class="spydr-workspace calc-workspace">
        
        <div class="calculator-chassis glass-panel">
            
            <header class="calc-header">
                <div class="brand">spydr <span>TI-30X</span></div>
                <div class="indicators">
                    <span id="deg-ind" class="active">DEG</span>
                    <span id="rad-ind">RAD</span>
                </div>
            </header>

            <div class="calc-screen">
                <div id="calc-history" class="history-line"></div>
                <div id="calc-current" class="current-line">0</div>
            </div>

            <div class="calc-keypad">
                <button class="calc-btn btn-fn" data-action="deg-rad">RAD/DEG</button>
                <button class="calc-btn btn-fn" data-value="sin(">sin</button>
                <button class="calc-btn btn-fn" data-value="cos(">cos</button>
                <button class="calc-btn btn-fn" data-value="tan(">tan</button>
                <button class="calc-btn btn-fn" data-value="!">x!</button>

                <button class="calc-btn btn-fn" data-value="√(">√x</button>
                <button class="calc-btn btn-fn" data-value="^">xʸ</button>
                <button class="calc-btn btn-fn" data-value="log(">log</button>
                <button class="calc-btn btn-fn" data-value="ln(">ln</button>
                <button class="calc-btn btn-fn" data-value="π">π</button>

                <button class="calc-btn btn-ctrl" data-value="(">(</button>
                <button class="calc-btn btn-ctrl" data-value=")">)</button>
                <button class="calc-btn btn-ctrl" data-value="e">e</button>
                <button class="calc-btn btn-danger" data-action="delete">DEL</button>
                <button class="calc-btn btn-danger" data-action="clear">AC</button>

                <button class="calc-btn btn-num" data-value="7">7</button>
                <button class="calc-btn btn-num" data-value="8">8</button>
                <button class="calc-btn btn-num" data-value="9">9</button>
                <button class="calc-btn btn-fn" data-value="ANS">ANS</button>
                <button class="calc-btn btn-op" data-value="÷">÷</button>

                <button class="calc-btn btn-num" data-value="4">4</button>
                <button class="calc-btn btn-num" data-value="5">5</button>
                <button class="calc-btn btn-num" data-value="6">6</button>
                <button class="calc-btn btn-op" data-value="×">×</button>
                <button class="calc-btn btn-op" data-value="-">-</button>

                <button class="calc-btn btn-num" data-value="1">1</button>
                <button class="calc-btn btn-num" data-value="2">2</button>
                <button class="calc-btn btn-num" data-value="3">3</button>
                <button class="calc-btn btn-op plus-btn" data-value="+">+</button>

                <button class="calc-btn btn-num zero-btn" data-value="0">0</button>
                <button class="calc-btn btn-num" data-value=".">.</button>
                <button class="calc-btn btn-equal" data-action="calculate">=</button>
            </div>

        </div>

    </main>

    <script src="/js/globalmenu.js"></script>
    <script type="module" src="/js/global.js"></script>
    
    <script type="module" src="/js/calculator.js"></script>

</body>
</html>
