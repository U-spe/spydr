<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>spydr // comms</title>

  <link rel="icon" href="/assets/images/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <div id="loader"></div>

  <div id="bg-effects-container">
      <canvas id="stars-canvas"></canvas>
      <div id="fog-overlay"></div>
  </div>

  <div class="top-right-profile" onclick="go('/login.html')">
    <span id="top-right-name">Login</span>
    <div class="pfp-icon"></div>
  </div>

  <div id="global-menu"></div>

  <div class="chat-app">
    
    <div class="chat-sidebar">
      <div class="sidebar-header">
        <img src="/assets/images/favicon.png" alt="spydr" class="spydr-logo-small">
        <h2>spydr net</h2>
      </div>
      
      <div class="channel-list">
        <div class="channel-category">TEXT CHANNELS</div>
        <div class="channel active"><i class="ri-hashtag"></i> global</div>
        <div class="channel"><i class="ri-hashtag"></i> dev-logs</div>
        <div class="channel"><i class="ri-hashtag"></i> off-topic</div>
        
        <div class="channel-category category-header" style="margin-top: 20px;">
          <span>PRIVATE CHATS</span>
          <button id="create-dm-btn" title="Create Private Chat"><i class="ri-add-line"></i></button>
        </div>
        </div>
    </div>

    <div class="chat-main">
      <div class="chat-header">
        <div class="chat-title"><i class="ri-hashtag"></i> global</div>
        <div class="chat-desc">Welcome to the main spydr network.</div>
      </div>

      <div class="chat-messages" id="chat-messages">
        </div>

      <div class="chat-input-area">
        <form id="chat-form">
          <input type="text" id="message-input" placeholder="Connecting to spydr net..." autocomplete="off" disabled>
          <button type="submit" id="send-btn" disabled><i class="ri-send-plane-fill"></i></button>
        </form>
      </div>
    </div>

  </div>

  <script src="/js/globalmenu.js"></script>
  <script type="module" src="/js/global.js"></script>
  <script type="module" src="/js/chat.js"></script>

  <script>
  function go(page){
    document.body.style.opacity = "0";
    setTimeout(()=>location.href=page,300);
  }
  </script>

</body>
</html>
