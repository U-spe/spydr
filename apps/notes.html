<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spydr // notes</title>
    
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/notepad.css">
    <link rel="stylesheet" href="/css/menu.css">
</head>

<body data-bg-style="stars">

    <div id="bg-effects-container">
        <canvas id="stars-canvas"></canvas>
    </div>

    <div id="global-menu"></div>

    <main class="spydr-workspace">
        
        <aside class="notes-sidebar glass-panel">
            <header class="sidebar-header">
                <h2>sys_notes</h2>
                <button id="add-note-btn" class="icon-btn" title="Create New Note">
                    <i class="ri-add-line"></i>
                </button>
            </header>
            
            <div class="search-bar">
                <i class="ri-search-line"></i>
                <input type="text" id="note-search" placeholder="Search entries...">
            </div>

            <div id="note-list" class="note-list">
                </div>
        </aside>

        <section class="note-editor glass-panel">
            <div id="empty-state" class="empty-state">
                <i class="ri-quill-pen-line"></i>
                <p>Select a note or create a new one.</p>
            </div>

            <div id="active-editor" class="active-editor hidden">
                <header class="editor-header">
                    <input type="text" id="note-title" class="title-input" placeholder="Note Title..." autocomplete="off">
                    <div class="editor-actions">
                        <span id="save-status" class="save-status">Saved</span>
                        <button id="delete-note-btn" class="icon-btn danger" title="Delete Note">
                            <i class="ri-delete-bin-line"></i>
                        </button>
                    </div>
                </header>
                
                <div class="editor-body">
                    <textarea id="note-content" class="content-input" placeholder="Start typing..."></textarea>
                </div>
                
                <footer class="editor-footer">
                    <span id="note-timestamp" class="timestamp"></span>
                </footer>
            </div>
        </section>

    </main>

    <script src="/js/globalmenu.js"></script>
    <script type="module" src="/js/global.js"></script>
    
    <script type="module" src="/js/notepad.js"></script>

</body>
</html>
