<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* Keeps the background transparent and text white to match your site */
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      color-scheme: dark;
    }
  </style>
</head>
<body>

  <div id="games"></div>
  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark'
    });
  </script>

</body>
</html>
