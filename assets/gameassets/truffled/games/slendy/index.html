<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Slendytubbies2</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="preload" href="Build/BuilderRuilder.loader.js" as="script">
    <link rel="preload" href="Build/BuilderRuilder.framework.js" as="script">
    <link rel="preload" href="Build/BuilderRuilder.wasm" as="fetch" crossorigin>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background: #000; }
      #unity-container { width: 100vw; height: 100vh; }
      #unity-canvas { width: 100% !important; height: 100% !important; }
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
      #unity-logo { width: 154px; height: 130px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"></svg>') center / contain no-repeat; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"></svg>') no-repeat center; }
      #unity-progress-bar-full { width: 0%; height: 18px; margin-top: 10px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"></svg>') no-repeat center; }
      #unity-warning { position: absolute; left: 50%; top: 5%; transform: translateX(-50%); background: white; padding: 10px; display: none; }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/BuilderRuilder.loader.js";

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      loadingBar.style.display = "block";

      var TOTAL_PARTS = 11;
      var partProgress = new Array(TOTAL_PARTS).fill(0);

      function updateProgress() {
        var total = partProgress.reduce(function(a, b) { return a + b; }, 0) / TOTAL_PARTS;
        progressBarFull.style.width = (total * 50) + "%";
      }

      function fetchPart(index) {
        var n = String(index + 1).padStart(2, "0");
        var url = buildUrl + "/BuilderRuilder.data.part" + n;
        return fetch(url).then(function(res) {
          if (!res.ok) throw new Error("Failed to fetch part " + n);
          var reader = res.body.getReader();
          var contentLength = +res.headers.get("Content-Length") || 0;
          var received = 0;
          var chunks = [];
          function read() {
            return reader.read().then(function(result) {
              if (result.done) return chunks;
              chunks.push(result.value);
              received += result.value.length;
              if (contentLength) partProgress[index] = received / contentLength;
              updateProgress();
              return read();
            });
          }
          return read().then(function(chunks) {
            partProgress[index] = 1;
            updateProgress();
            var total = chunks.reduce(function(a, c) { return a + c.length; }, 0);
            var merged = new Uint8Array(total);
            var offset = 0;
            chunks.forEach(function(c) { merged.set(c, offset); offset += c.length; });
            return merged;
          });
        });
      }

      var parts = [];
      for (var i = 0; i < TOTAL_PARTS; i++) parts.push(fetchPart(i));

      Promise.all(parts).then(function(buffers) {
        var total = buffers.reduce(function(a, b) { return a + b.length; }, 0);
        var combined = new Uint8Array(total);
        var offset = 0;
        buffers.forEach(function(b) { combined.set(b, offset); offset += b.length; });
        var blob = new Blob([combined], { type: "application/octet-stream" });
        var dataUrl = URL.createObjectURL(blob);
        var config = {
          dataUrl: dataUrl,
          frameworkUrl: buildUrl + "/BuilderRuilder.framework.js",
          codeUrl: buildUrl + "/BuilderRuilder.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "KAIDENSARCADE",
          productName: "Slendytubbies2",
          productVersion: "0.3",
          showBanner: unityShowBanner,
        };
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
          createUnityInstance(canvas, config, function(progress) {
            progressBarFull.style.width = (50 + progress * 50) + "%";
          }).then(function(unityInstance) {
            loadingBar.style.display = "none";
            URL.revokeObjectURL(dataUrl);
            canvas.addEventListener('click', function() {
              canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
              canvas.requestPointerLock();
            });
          }).catch(function(message) { alert(message); });
        };
        document.body.appendChild(script);
      }).catch(function(err) {
        unityShowBanner("Failed to load game data: " + err.message, "error");
      });
    </script>
  </body>
</html>
