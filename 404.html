<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 - Spydr</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #000000, #120018, #2a0040);
  overflow: hidden;
  color: white;
}

/* glow */
.glow {
  position: absolute;
  width: 450px;
  height: 450px;
  border-radius: 50%;
  filter: blur(130px);
  opacity: 0.35;
}

.glow.purple {
  background: #a855f7;
  top: -120px;
  left: -120px;
}

.glow.blue {
  background: #3b82f6;
  bottom: -120px;
  right: -120px;
}

/* card */
.card {
  position: relative;
  text-align: center;
  padding: 40px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  width: 340px;
}

/* logo */
.logo {
  width: 70px;
  height: 70px;
  margin: 0 auto 15px;
  border-radius: 14px;
}

/* 🔥 GLITCH TEXT */
.glitch {
  font-size: 3.2rem;
  font-weight: 800;
  position: relative;
  display: inline-block;
  color: white;
}

.glitch::before,
.glitch::after {
  content: "404";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  opacity: 0.8;
}

.glitch::before {
  color: #a855f7;
  z-index: -1;
  animation: glitch1 0.8s infinite;
}

.glitch::after {
  color: #3b82f6;
  z-index: -2;
  animation: glitch2 0.8s infinite;
}

@keyframes glitch1 {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-1px, -2px); }
  60% { transform: translate(2px, 1px); }
  80% { transform: translate(-2px, -1px); }
  100% { transform: translate(0); }
}

@keyframes glitch2 {
  0% { transform: translate(0); }
  20% { transform: translate(2px, -2px); }
  40% { transform: translate(1px, 2px); }
  60% { transform: translate(-2px, 1px); }
  80% { transform: translate(2px, 2px); }
  100% { transform: translate(0); }
}

p {
  opacity: 0.7;
  font-size: 0.9rem;
  margin: 12px 0 20px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #a855f7;
  color: white;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #9333ea;
}
</style>
</head>

<body>

<div class="glow purple"></div>
<div class="glow blue"></div>

<div class="card">
  <img class="logo" src="/assets/images/logo.png" />

  <div class="glitch">404</div>

  <p>this page got tangled up in a spider web🕷️</p>

  <button onclick="goBack()">go back</button>
</div>

<script>
function goBack() {
  if (document.referrer) {
    window.history.back();
  } else {
    window.location.href = "/";
  }
}
</script>

</body>
</html>
