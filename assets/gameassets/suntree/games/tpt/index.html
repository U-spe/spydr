  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #000000, #1a0030, #0d001a, #2a0050, #000000);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      font-family: 'Figtree', sans-serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 36px 40px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(160, 80, 220, 0.35);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      text-align: center;
      max-width: 340px;
      animation: fadeUp 0.6s ease forwards;
    }

    .icon { font-size: 36px; line-height: 1; }

    .warning {
      color: rgba(192, 132, 252, 0.75);
      font-size: 13px;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .warning strong { color: #c084fc; font-weight: 600; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: 'Figtree', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
      background: linear-gradient(135deg, #8b2fa0, #c084fc);
      box-shadow: 0 4px 20px rgba(139, 47, 160, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(192, 132, 252, 0.6);
    }
#credits {
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(160, 80, 220, 0.35);
      border-radius: 8px;
      padding: 6px 10px 6px 8px;
      backdrop-filter: blur(6px);
    }

    #credits img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.9;
    }

    #credits span {
      font-family: 'Figtree', sans-serif;
      font-size: 12px;
      color: rgba(192, 132, 252, 0.85);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
    <div id="credits">
      <img src="/images/nreds.png" alt="korona">
      <span>korona.lat</span>
    </div>
  <div class="card">
    <p class="warning">
      for some reason, cors doesnt work in iframe, so the game WILL Need to be opened in a new tab, sorry for the inconvinience! 
    </p>
    <button onclick="window.open('tpt.html', '_blank')">open game, duh.</button>
  </div>
</body>
</html>
