<!DOCTYPE html>
<html>
<head>
    <title>Project Diva extend ported by meximath well not really but ykwim</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #em {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* tung sahur */
        #em canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="em"></div>

    <script>
        EJS_player = '#em';
EJS_color = "#0F1912";
EJS_startOnLoaded = true
        EJS_core = 'psp';
        EJS_gameUrl = '/flashcard/divaextend/diva.iso';
        EJS_pathtodata = '/em/';
        EJS_threads = true;
        window.addEventListener('resize', () => {
            const canvas = document.querySelector('#em canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
    <script src="/em/loader.js"></script>
</body>
</html>
