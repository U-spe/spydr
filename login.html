<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>spydr // auth</title>

  <link rel="icon" href="/assets/images/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/menu.css">
</head>
<body>

  <div id="bg-effects-container">
      <canvas id="stars-canvas"></canvas>
      <div id="fog-overlay"></div>
  </div>

  <div id="global-menu"></div>

  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="auth-header">
        <img src="/assets/images/favicon.png" alt="spydr" class="spydr-logo">
        <h2>spydr net // uplink</h2>
      </div>

      <div class="auth-tabs">
        <button id="tab-login" class="active">Login</button>
        <button id="tab-signup">Sign Up</button>
      </div>

      <form id="auth-form">
        <div class="input-group">
          <label for="email">Email Sequence</label>
          <input type="email" id="email" placeholder="agent@spydr.net" required autocomplete="off">
        </div>
        
        <div class="input-group">
          <label for="password">Passcode</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <button type="submit" id="submit-btn">Initialize Connection</button>
      </form>
      
      <button id="guest-btn" class="guest-btn">Proceed as Guest</button>
      
      <button onclick="window.location.href='/dashboard.html'" class="guest-btn" style="margin-top: 10px; border-style: solid;">Access Dashboard</button>
      
    </div>
  </div>

  <script src="/js/globalmenu.js"></script>
  <script type="module" src="/js/login.js"></script>

</body>
</html>
